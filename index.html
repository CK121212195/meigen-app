<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名言・格言365選</title>
  
  <!-- 💡魔法のタグ：Googleのサーバーへ事前に接続準備をして少しでも速くする -->
  <link rel="preconnect" href="https://script.google.com">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* 💡追加：読み込み中の「くるくる」アニメーション */
    .loader {
      border: 4px solid rgba(0, 0, 0, 0.05);
      border-top: 4px solid #2193b0;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      position: absolute;
      z-index: 1; /* 裏側に配置 */
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      position: relative;
      z-index: 2;
      opacity: 0; /* 最初は透明にして隠しておく */
      transition: opacity 0.8s ease; /* ふわっと表示させる */
    }
  </style>
</head>
<body>

  <!-- くるくるアニメーションの表示 -->
  <div class="loader"></div>

  <!-- ↓ ここにGASのURLを貼り付けます（onloadで読み込み完了時にふわっと表示） -->
  <iframe src="https://script.google.com/macros/s/AKfycby_lLf3c2AD6-gB2A2ceSDanXUbo0CGwKeWL7lZ2VDKVuzMxMQl9ZJiKQ6tpr2Ikdej/exec" onload="this.style.opacity=1"></iframe>

</body>
</html>
